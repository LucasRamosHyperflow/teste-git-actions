name: Auto PR from Latest Release to Staging

on:
  push:
    branches:
      - 'release-*'

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr-staging:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout completo do repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Configurar Git
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3️⃣ Descobrir a última release
      - name: Find latest release
        id: latest
        run: |
          LATEST=$(git branch -r | grep 'origin/release-' | sed 's|origin/||' | sort -V | tail -n1 | xargs)
          echo "last_release=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest release found: '$LATEST'"

      # 4️⃣ Verificar se o push atual é da última release
      - name: Check current branch
        id: check
        run: |
          CURRENT_BRANCH="${GITHUB_REF##*/}"
          echo "Current branch: '$CURRENT_BRANCH'"
          if [ "$CURRENT_BRANCH" != "${{ steps.latest.outputs.last_release }}" ]; then
            echo "not_latest=true" >> $GITHUB_OUTPUT
          else
            echo "not_latest=false" >> $GITHUB_OUTPUT
          fi

      # 5️⃣ Criar ou atualizar Pull Request para staging
      - name: Create or update Pull Request to staging
        if: steps.check.outputs.not_latest == 'false'
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: pr-${{ steps.latest.outputs.last_release }}-to-staging
          base: staging
          title: "Merge ${{ steps.latest.outputs.last_release }} into staging"
          body: |
            PR criado automaticamente pelo GitHub Actions.
            Release: **${{ steps.latest.outputs.last_release }}**
          labels: auto-merge
          commit-message: "[create-pull-request] automated change"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          signoff: false
          delete-branch: false
          draft: false

      # 6️⃣ Aprovar PR automaticamente (para permitir auto-merge)
      - name: Approve Pull Request
        if: steps.check.outputs.not_latest == 'false'
        uses: hmarr/auto-approve-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.pr.outputs.pull-request-number }}
          review-message: "Approved automatically by GitHub Actions"
