name: Auto Merge Latest Release to Staging

on:
  push:
    branches:
      - 'release-*'

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-to-staging:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check if this is the latest release
      id: check
      run: |
        CURRENT=${GITHUB_REF##*/}
        LATEST=$(git branch -r | grep 'origin/release-' | sed 's|.*origin/||' | sort -V | tail -n1)
        
        echo "current=$CURRENT" >> $GITHUB_OUTPUT
        echo "latest=$LATEST" >> $GITHUB_OUTPUT
        
        if [ "$CURRENT" = "$LATEST" ]; then
          echo "is_latest=true" >> $GITHUB_OUTPUT
        else
          echo "is_latest=false" >> $GITHUB_OUTPUT
        fi

    - name: Create PR to staging
      if: steps.check.outputs.is_latest == 'true'
      run: |
        gh pr create \
          --title "Merge ${{ steps.check.outputs.current }} to staging" \
          --body "Auto-merge latest release to staging" \
          --base staging \
          --head ${{ steps.check.outputs.current }} || echo "PR may already exist"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}