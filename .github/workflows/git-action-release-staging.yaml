name: Auto PR from Latest Release to Staging

on:
  push:
    branches:
      - 'release-*'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout completo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Configurar Git
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      # 3️⃣ Branch atual
      - name: Current branch
        id: current
        run: |
          echo "current_branch=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      # 4️⃣ Criar commit dummy (para garantir PR mesmo sem alterações)
      - name: Create dummy commit
        run: |
          git checkout -B pr-${{ steps.current.outputs.current_branch }}-to-staging
          # Criar ou atualizar um arquivo oculto com timestamp
          echo "$(date)" > .github/.last-release-update
          git add .github/.last-release-update
          git commit -m "[ci] update dummy file for PR to staging" || echo "No changes to commit"

      # 5️⃣ Push da branch do PR
      - name: Push PR branch
        run: |
          git push -u origin pr-${{ steps.current.outputs.current_branch }}-to-staging --force

      # 6️⃣ Criar ou atualizar Pull Request
      - name: Create or update Pull Request to staging
        id: pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: pr-${{ steps.current.outputs.current_branch }}-to-staging
          base: staging
          title: "Merge ${{ steps.current.outputs.current_branch }} into staging"
          body: |
            PR criado automaticamente pelo GitHub Actions.
            Release: **${{ steps.current.outputs.current_branch }}**
          labels: auto-merge
          commit-message: "[create-pull-request] automated change"
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          signoff: false
          delete-branch: false
          draft: false

      # 7️⃣ Aprovar PR automaticamente
      - name: Approve Pull Request
        uses: hmarr/auto-approve-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.pr.outputs.pull-request-number }}
          review-message: "Approved automatically by GitHub Actions"
