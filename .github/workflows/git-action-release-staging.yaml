name: Auto Merge Latest Release to Staging

on:
  push:
    branches:
      - 'release-*'

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-to-staging:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Check if this is the latest release
      id: check
      run: |
        CURRENT=${GITHUB_REF##*/}
        LATEST=$(git branch -r | grep 'origin/release-' | sed 's|.*origin/||' | sort -V | tail -n1)
        
        echo "current=$CURRENT" >> $GITHUB_OUTPUT
        echo "latest=$LATEST" >> $GITHUB_OUTPUT
        
        if [ "$CURRENT" = "$LATEST" ]; then
          echo "is_latest=true" >> $GITHUB_OUTPUT
        else
          echo "is_latest=false" >> $GITHUB_OUTPUT
        fi

    - name: Create and merge PR to staging
      if: steps.check.outputs.is_latest == 'true'
      run: |
        # Criar PR ou pegar o número se já existir
        PR_URL=$(gh pr create \
          --title "Merge ${{ steps.check.outputs.current }} to staging" \
          --body "Auto-merge latest release to staging" \
          --base staging \
          --head ${{ steps.check.outputs.current }} 2>/dev/null) || \
        PR_URL=$(gh pr list --head ${{ steps.check.outputs.current }} --base staging --json url --jq '.[0].url')
        
        # Extrair número do PR
        PR_NUMBER=$(echo "$PR_URL" | grep -o '[0-9]\+$') 
        echo "Working with PR #$PR_NUMBER"
        
        # Mergear o PR
        gh pr merge "$PR_NUMBER" --merge --delete-branch=false
        echo "Successfully merged PR #$PR_NUMBER"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Notify Teams
      if: always()
      run: |
        if [ "${{ job.status }}" = "success" ]; then
          ICON="✅"
          STATUS="SUCCESS"
        else
          ICON="❌"
          STATUS="FAILED"
        fi
    
        cat > payload.json <<EOF
        {
          "type": "AdaptiveCard",
          "\$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
          "version": "1.5",
          "body": [
            {
              "type": "TextBlock",
              "size": "Large",
              "weight": "Bolder",
              "text": "${ICON} Auto Merge Release"
            },
            {
              "type": "TextBlock",
              "text": "Resultado da sincronização automática para staging",
              "isSubtle": true,
              "wrap": true
            },
            {
              "type": "FactSet",
              "facts": [
                {
                  "title": "Repository",
                  "value": "${{ github.repository }}"
                },
                {
                  "title": "Source Branch",
                  "value": "${{ steps.check.outputs.current }}"
                },
                {
                  "title": "Target Branch",
                  "value": "staging"
                },
                {
                  "title": "Status",
                  "value": "${STATUS}"
                },
                {
                  "title": "Triggered By",
                  "value": "${{ github.actor }}"
                },
                {
                  "title": "Commit",
                  "value": "${{ github.sha }}"
                }
              ]
            }
          ],
          "actions": [
            {
              "type": "Action.OpenUrl",
              "title": "View Workflow",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            },
            {
              "type": "Action.OpenUrl",
              "title": "View Pull Request",
              "url": "${{ steps.merge.outputs.pr_url }}"
            }
          ]
        }
        EOF
    
        curl \
          -H "Content-Type: application/json" \
          --data @payload.json \
          "https://default8e5c6a4bf9d64d0b89f5445169c45b.e9.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/ecb7013ab1bf475eaa677711fd06c360/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=BlTFvMwrkKL3e9wsz207cvhbW25OZlr_0FvXkrxeItg"
