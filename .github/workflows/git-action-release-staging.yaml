name: PR from Release to Staging

on:
  push:
    branches:
      - 'release-*'

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descobrir última release
        id: latest
        run: |
          LATEST=$(git branch -r | grep 'origin/release-' | sed 's|origin/||' | sort -V | tail -n1 | xargs)
          echo "last_release=$LATEST" >> $GITHUB_OUTPUT
          echo "Última release encontrada: '$LATEST'"

      - name: Verificar se é a última release
        id: check
        run: |
          CURRENT_BRANCH="${GITHUB_REF##*/}"
          echo "Branch atual: '$CURRENT_BRANCH'"
          if [ "$CURRENT_BRANCH" != "${{ steps.latest.outputs.last_release }}" ]; then
            echo "not_latest=true" >> $GITHUB_OUTPUT
          else
            echo "not_latest=false" >> $GITHUB_OUTPUT
          fi

      - name: Criar Pull Request para staging
        if: steps.check.outputs.not_latest == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: pr-${{ steps.latest.outputs.last_release }}-to-staging
          base: staging
          title: "Merge ${{ steps.latest.outputs.last_release }} into staging"
          body: |
            Este PR foi criado automaticamente pelo GitHub Actions.
            Release: **${{ steps.latest.outputs.last_release }}**
          labels: auto-merge   # 👈 label para permitir auto-merge
